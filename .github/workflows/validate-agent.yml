name: Validate agent

# Mechanizes the CLAUDE.md authoring checklist on every push / PR, so a broken
# agent or script is caught here instead of at deploy time. Mirrors the local
# checks in lib/validate-agent.sh.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    name: Agent data + shell lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML (for the validator's YAML checks)
        run: python -m pip install --upgrade pip pyyaml

      - name: Validate every agent directory (structure + contract)
        run: bash lib/validate-agent.sh --all

      - name: Syntax-check shell scripts
        run: |
          set -e
          shopt -s nullglob
          for f in create-droplet.sh bootstrap.sh install-agent.sh lib/*.sh; do
            echo "bash -n $f"
            bash -n "$f"
          done

      - name: ShellCheck shell scripts (error severity)
        run: |
          shopt -s nullglob
          shellcheck -S error create-droplet.sh bootstrap.sh install-agent.sh lib/*.sh
